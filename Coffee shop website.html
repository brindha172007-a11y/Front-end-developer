<!DOCTYPE html>
<html>
<head>
    <title>Coffee Shop</title>
    <style>
        body{
            font-family: Arial;
            text-align:center;
            background:#f5e6cc;
        }
        header{
            background:brown;
            color:white;
            padding:15px;
        }
        img{
            width:250px;
            border-radius:10px;
        }
        .menu{
            margin-top:20px;
        }
        button{
            background:brown;
            color:white;
            padding:10px 20px;
            border:none;
            border-radius:5px;
        }
        footer{
            margin-top:20px;
            background:brown;
            color:white;
            padding:10px;
        }
    </style>
</head>
<body>

<header>
    <h1>☕ Coffee Shop</h1>
</header>

<h2>Welcome to Our Coffee Shop</h2>

<img src="coffee.jpeg" alt="Coffee">

<div class="menu">
    <h3>Menu</h3>
    <p>Espresso - ₹120</p>
    <p>Cappuccino - ₹150</p>
    <p>Latte - ₹180</p>

    <button>Order Now</button>
</div>

<footer>
    <p>© 2026 Coffee Shop</p>
</footer>

</body>
</html>
