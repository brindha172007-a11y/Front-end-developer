<!DOCTYPE html>
<html>
<head>
    <title>Nature Image Slider</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background-color:#f2f2f2;
            text-align:center;
        }

        h1{
            background-color:teal;
            color:white;
            padding:20px;
            margin:0;
        }

        .slider{
            width:600px;
            margin:40px auto;
            background-color:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 4px 10px gray;
        }

        .slider img{
            width:100%;
            height:350px;
            border-radius:10px;
            object-fit:cover;
        }

        button{
            padding:12px 25px;
            margin:15px;
            border:none;
            background-color:teal;
            color:white;
            font-size:18px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background-color:darkcyan;
        }

    </style>
</head>

<body>

    <h1>Nature Image Slider</h1>

    <div class="slider">

        <img id="slide"
        src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop">

        <br>

        <button onclick="previousImage()">
            Previous
        </button>

        <button onclick="nextImage()">
            Next
        </button>

    </div>

    <script>

        var images = [

        "https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop",

        "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200&auto=format&fit=crop",

        "https://images.unsplash.com/photo-1493246507139-91e8fad9978e?q=80&w=1200&auto=format&fit=crop",

        "https://images.unsplash.com/photo-1470770841072-f978cf4d019e?q=80&w=1200&auto=format&fit=crop"

        ];

        var index = 0;

        function nextImage(){

            index++;

            if(index >= images.length){

                index = 0;

            }

            document.getElementById("slide").src =
            images[index];

        }

        function previousImage(){

            index--;

            if(index < 0){

                index = images.length - 1;

            }

            document.getElementById("slide").src =
            images[index];

        }

    </script>

</body>
</html>
